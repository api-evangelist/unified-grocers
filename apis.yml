description: >-
  Unified Grocers was a retailer-owned wholesale grocery cooperative that supplied
  independent supermarkets primarily in the western United States. Founded through
  the 1999 merger of Certified Grocers of California and Shurfine International
  subsidiaries, the cooperative served over 3,000 retail stores with annual sales
  exceeding $4 billion. In 2017, Unified Grocers was acquired by SuperValu (now
  UNFI — United Natural Foods Inc.), ending its existence as an independent entity.
  As a result, Unified Grocers does not maintain a public API developer portal or
  externally accessible APIs.
